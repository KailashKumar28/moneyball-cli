# Moneyball TUI Feature Inventory
#
# Each feature has:
#   id          - short kebab-case identifier
#   area        - group: cli | tui | wizard | session | slash | subcommand
#   name        - human-readable name
#   expected    - description of correct behavior (the "desired state")
#   screenshot  - path under .test-harness/screenshots/<id>/latest.png
#   status      - pending | passing | failing | blocked
#   notes       - any caveats or follow-up

[[features]]
id = "welcome-view"
area = "tui"
name = "Welcome view (no workspace)"
expected = "When moneyball launches with no workspace configured, it shows: the MONEYBALL ASCII logo with a cyan diamond glyph, the workspace context line, and the first-run setup wizard step 1 (workspace path input). The cursor sits at the end of the input field. Box borders render cleanly."
screenshot = "screenshots/welcome-view/latest.png"
status = "passing"
notes = "Captured at 120x40. Logo, wizard panel, cursor all visible."

[[features]]
id = "wizard-step-1-workspace"
area = "wizard"
name = "Wizard step 1: workspace path"
expected = "Form-style input with the current default path pre-filled. Pressing Enter accepts. Backspace edits. Esc clears the input (does NOT quit - see slash-exit-command). Help text visible at the bottom."
screenshot = "screenshots/wizard-step-1-workspace/latest.png"
status = "passing"
notes = "Live-tested via pilotty: type text, Esc clears, second Esc shows hint, session stays running."

[[features]]
id = "wizard-step-2-meta"
area = "wizard"
name = "Wizard step 2: connect Meta (token input + select list)"
expected = "Substep 0: paste Meta Marketing API token (rendered as bullets for security) or type 'skip'. Substep 1: multi-select checklist of discovered ad accounts. Up/Down/PgUp/PgDn/Home/End to move. Space toggles. 'a' selects all/none. Enter confirms. Status 101 (PENDING_SETUP) shown explicitly. Unknown statuses show 'OTHER' not 'status101'. Substep 2 (rename) is still under review (user unsure)."
screenshot = "screenshots/wizard-step-2-meta/latest.png"
status = "passing"
notes = "Token now masked as bullets (security fix). Status 101 -> PENDING_SETUP, unknown -> OTHER (was 'status101'). Footer fixed. Substep-1 Esc=back (correct, navigates back to substep 0)."

[[features]]
id = "wizard-step-3-products"
area = "wizard"
name = "Wizard step 3: confirm products"
expected = "Auto-filled list of selected Meta ad accounts. 'Name AdAccount' or 'demo' adds manually. Each row shows product name + ad account ID. Esc clears the input instead of quitting."
screenshot = "screenshots/wizard-step-3-products/latest.png"
status = "passing"
notes = "Footer fixed (was 'Esc to quit', now 'Esc clears input, /exit to quit')."

[[features]]
id = "wizard-step-4-goals"
area = "wizard"
name = "Wizard step 4: goals per product"
expected = "For each product, prompt for daily qualified-lead goal. Default 10. Empty Enter accepts default. Hint text appears BEFORE the input (not after). Esc clears input instead of quitting."
screenshot = "screenshots/wizard-step-4-goals/latest.png"
status = "passing"
notes = "Reordered hint from after-input to before-input. Footer fixed."

[[features]]
id = "brief-command"
area = "subcommand"
name = "moneyball brief"
expected = "Prints a per-product 7-day brief table (spend/day, leads, qualified, q/day, Rs/q, lead-to-qualified rate, goal, gap) plus a FEASIBILITY section with portfolio totals and required-spend math. Parity-verified vs mb.py scoreboard."
screenshot = "screenshots/brief-command/latest.png"
status = "passing"
notes = "Verified against fin_campaign_analysis 2026-07-13 snapshot."

[[features]]
id = "snapshot-command"
area = "subcommand"
name = "moneyball snapshot"
expected = "Validates the JSON snapshot for a given date. Exits non-zero on schema errors. Prints which fields are missing or malformed."
screenshot = "screenshots/snapshot-command/latest.png"
status = "pending"

[[features]]
id = "repl-default"
area = "cli"
name = "moneyball (no args) -> REPL"
expected = "Starts the interactive TUI. Default behavior of the binary."
screenshot = "screenshots/repl-default/latest.png"
status = "passing"

[[features]]
id = "repl-chat-bar"
area = "tui"
name = "Chat-style input bar (codex style)"
expected = "Original-codex style chat input. NO bordered box. NO static command list. Inline completion ghost when typing '/'. Keybinding caption visible (e.g. 'enter to send, esc to clear'). Placeholder text shown when input is empty (e.g. 'Ask moneyball or type / for commands'). Bottom row sits flush against the terminal edge."
screenshot = "screenshots/repl-chat-bar/latest.png"
status = "passing"
notes = "Implemented per AGENTS.md: 'chat-style input bar (no bordered box, no static command list, inline completion ghost, keybinding caption, placeholder text)'."

# ESC BEHAVIOR
# Per user: "ESE should not quit there should be an /exit command to get out of moneyball"
# Esc on empty input -> shows 'press esc to clear' or similar (no quit arm).
# Esc on non-empty input -> clears the input.
# /exit (or /quit, /q) is the only way to quit.
# The double-Esc-quit feature is REMOVED. There's no `repl-double-esc` feature here.

[[features]]
id = "repl-esc-clears"
area = "tui"
name = "Esc clears the input (no quit)"
expected = "Pressing Esc on a non-empty input clears it. Pressing Esc on empty input shows a hint (e.g. 'use /exit to quit') but does NOT quit. The double-Esc quit shortcut from earlier codex-style implementations is removed. Only /exit (or /quit, /q) ends moneyball."
screenshot = "screenshots/repl-esc-clears/latest.png"
status = "passing"
notes = "Removed handle_esc quit logic in lib.rs. Removed dead esc_armed_at field and arm_cancel function. Updated keybinding caption from 'esc esc to quit' to '/exit to quit'."

[[features]]
id = "repl-logo"
area = "tui"
name = "Moneyball ASCII logo on session start"
expected = "The first cell on every fresh session is a System cell containing the MONEYBALL ASCII art with cyan diamond."
screenshot = "screenshots/repl-logo/latest.png"
status = "passing"

