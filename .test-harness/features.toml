# SESSIONS
[[features]]
id = "session-save"
area = "session"
name = "Session persistence on quit"
expected = "On /exit (or /quit, /q), a Session JSON file is written to ~/.moneyball/sessions/. Includes all chat cells (System, UserPrompt, AssistantText, ToolCall)."
screenshot = "screenshots/session-save/latest.png"
status = "pending"

[[features]]
id = "session-resume"
area = "session"
name = "moneyball -c / --resume <id> (instant prompt)"
expected = "Loads the latest session (or named id). Does NOT replay the full message log. The screen shows just the prompt input ready for new commands. (User clarification: 'instant prompt without reply'. Original codex style.)"
screenshot = "screenshots/session-resume/latest.png"
status = "passing"
notes = "Fixed: load_session_into now resets chat to empty (no replay) but preserves session_id and session_started so new cells are appended to the same on-disk file. Removed dead session_cell_to_chat + parse_status helpers."

